name: Land Rover Scraper Semanal

on:
  schedule:
    - cron: '0 6 * * 1'  # toda segunda-feira às 06:00 UTC (03:00 horário de Brasília)
  workflow_dispatch:       # permite rodar manualmente pela aba Actions

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar dependências Python
        run: pip install requests beautifulsoup4

      - name: Rodar scraper
        env:
          BUBBLE_APP_NAME:  ${{ secrets.BUBBLE_APP_NAME }}
          BUBBLE_API_TOKEN: ${{ secrets.BUBBLE_API_TOKEN }}
          BUBBLE_DATA_TYPE: ${{ secrets.BUBBLE_DATA_TYPE }}
        run: python landrover_scraper.py

      - name: Verificar se CSV foi gerado
        run: |
          if [ ! -f landrover_acessorios.csv ]; then
            echo "❌ landrover_acessorios.csv não foi gerado pelo script"
            exit 1
          fi
          echo "✅ CSV gerado com $(wc -l < landrover_acessorios.csv) linhas"

      - name: Salvar CSV de volta no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landrover_acessorios.csv
          git diff --cached --quiet || git commit -m "chore: atualiza CSV $(date +'%Y-%m-%d')"
          git push
